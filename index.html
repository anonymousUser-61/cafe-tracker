<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Café Money Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#faf9f6;
  --sidebar:#1c1612;
  --accent:#c85d1a;
  --accent2:#e07a40;
  --text:#1c1612;
  --text2:#7a7068;
  --border:#e5dfd6;
  --white:#ffffff;
  --surface:#f2ede6;
  --green:#2a7a48;
  --red:#b53a2d;
  --shadow:0 1px 4px rgba(28,22,18,0.08);
}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;line-height:1.5}

/* ---- SIDEBAR ---- */
.sidebar{width:220px;background:var(--sidebar);min-height:100vh;display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}
.sidebar-brand{padding:20px 18px 14px;border-bottom:1px solid rgba(255,255,255,0.08)}
.cafe-name-wrap{cursor:pointer;display:flex;align-items:center;gap:6px}
.cafe-name-text{color:#fff;font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cafe-name-edit-btn{font-size:10px;color:rgba(255,255,255,0.35);flex-shrink:0}
.cafe-name-input{background:transparent;border:none;border-bottom:1px solid rgba(255,255,255,0.3);color:#fff;font-size:14px;font-family:inherit;font-weight:600;width:100%;outline:none;padding:2px 0}
.sidebar-subtitle{color:rgba(255,255,255,0.3);font-size:11px;margin-top:4px;letter-spacing:0.03em}
.sidebar-nav{flex:1;padding:10px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 18px;color:rgba(255,255,255,0.55);font-size:13.5px;cursor:pointer;transition:all 0.15s;border-left:3px solid transparent;user-select:none}
.nav-item:hover{color:rgba(255,255,255,0.9);background:rgba(255,255,255,0.05)}
.nav-item.active{color:#fff;background:rgba(255,255,255,0.07);border-left-color:var(--accent2)}
.nav-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.15);flex-shrink:0}
.nav-item.active .nav-dot{background:var(--accent2)}
.sidebar-ver{padding:14px 18px;color:rgba(255,255,255,0.2);font-size:11px;border-top:1px solid rgba(255,255,255,0.06)}

/* ---- MAIN LAYOUT ---- */
.main{flex:1;overflow:hidden}
.content{max-width:880px;margin:0 auto;padding:28px 24px}

/* ---- TYPOGRAPHY ---- */
.page-title{font-size:19px;font-weight:600;color:var(--text);margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.section-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--text2);margin-bottom:10px}

/* ---- STAT CARDS ---- */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:18px}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.stat-label{font-size:11px;color:var(--text2);font-weight:500;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.04em}
.stat-value{font-size:20px;font-weight:600;line-height:1}
.stat-value.pos{color:var(--green)}
.stat-value.neg{color:var(--red)}
.stat-sub{font-size:11px;color:var(--text2);margin-top:4px}

/* ---- FORM CARD ---- */
.form-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:18px;box-shadow:var(--shadow)}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group label{font-size:12px;color:var(--text2);font-weight:500}
.form-group input,
.form-group select{
  border:1px solid var(--border);
  border-radius:7px;
  padding:8px 10px;
  font-size:13.5px;
  font-family:inherit;
  color:var(--text);
  background:var(--bg);
  outline:none;
  transition:border-color 0.15s,box-shadow 0.15s;
  width:100%;
}
.form-group input:focus,
.form-group select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(200,93,26,0.1)}
.form-group.full{grid-column:1/-1}
.live-calc{display:flex;gap:14px;flex-wrap:wrap;font-size:13px;color:var(--text2);margin-top:8px;min-height:20px}
.live-calc strong{color:var(--text)}
.form-actions{display:flex;align-items:center;gap:10px;margin-top:14px;flex-wrap:wrap}
.sync-msg{font-size:12px;color:var(--text2)}
.sync-msg.ok{color:var(--green)}
.sync-msg.err{color:var(--red)}

/* ---- BUTTONS ---- */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:7px;font-size:13.5px;font-family:inherit;font-weight:500;cursor:pointer;transition:all 0.15s;user-select:none;text-decoration:none}
.btn-primary{background:var(--accent);color:#fff;border:1px solid var(--accent)}
.btn-primary:hover{background:#b05018;border-color:#b05018}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--text2);color:var(--text)}
.btn-sm{padding:5px 11px;font-size:12.5px;border-radius:6px}
.btn-del{background:transparent;color:var(--text2);border:none;padding:3px 7px;font-size:12px;border-radius:5px;cursor:pointer;opacity:0.6;transition:all 0.15s}
.btn-del:hover{background:rgba(181,58,45,0.1);color:var(--red);opacity:1}

/* ---- TABLE ---- */
.table-card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:18px;box-shadow:var(--shadow)}
.table-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;background:var(--bg)}
.table-title{font-size:13px;font-weight:600}
.table-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.month-sel{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)}
.month-sel select{border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:12px;font-family:inherit;background:var(--bg);color:var(--text);outline:none}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:500px}
th{padding:9px 12px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap;background:var(--surface)}
td{padding:9px 12px;border-bottom:1px solid var(--surface);white-space:nowrap;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fdf9f4}
td.bold{font-weight:600}
td.muted{color:var(--text2);font-size:12.5px}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11.5px;font-weight:500;background:var(--surface);color:var(--text2);white-space:nowrap}
.empty{text-align:center;padding:28px 16px;color:var(--text2);font-size:13px}

/* ---- P&L ---- */
.pl-wrap{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:18px;box-shadow:var(--shadow)}
.pl-row{display:flex;justify-content:space-between;align-items:center;padding:11px 20px;border-bottom:1px solid var(--surface);font-size:13.5px}
.pl-row:last-child{border-bottom:none}
.pl-row.head-row{background:var(--surface);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--text2);padding:9px 20px}
.pl-row.section-head{background:var(--surface);font-weight:600}
.pl-row.sub{padding-left:38px;color:var(--text2);font-size:13px}
.pl-row.divider{border-top:2px solid var(--border)}
.pl-row.total-row{font-weight:600;border-top:2px solid var(--border);background:var(--surface)}
.pl-row.net{font-weight:700;font-size:15px;border-top:2px solid var(--border)}
.pl-row.after{font-weight:600;border-top:1px solid var(--border)}

/* ---- SETTINGS ---- */
.settings-block{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:16px;box-shadow:var(--shadow)}
.settings-block h3{font-size:14px;font-weight:600;margin-bottom:14px}
.settings-row{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.settings-row label{font-size:12px;color:var(--text2);font-weight:500}
.settings-row input,.settings-row textarea{border:1px solid var(--border);border-radius:7px;padding:8px 10px;font-size:13.5px;font-family:inherit;color:var(--text);background:var(--bg);outline:none;width:100%;transition:border-color 0.15s}
.settings-row input:focus,.settings-row textarea:focus{border-color:var(--accent)}
.info-box{background:var(--surface);border-radius:8px;padding:12px 14px;font-size:13px;color:var(--text2);line-height:1.65;border-left:3px solid var(--border)}
.info-box strong{color:var(--text);font-weight:500}
.code-steps{background:#1c1612;color:#d4c8be;border-radius:8px;padding:14px;font-size:12.5px;font-family:'Courier New',monospace;overflow-x:auto;white-space:pre-wrap;margin-top:10px;line-height:1.7}
.row-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

/* ---- TOAST ---- */
.toast{position:fixed;bottom:20px;right:20px;background:var(--text);color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;opacity:0;transition:opacity 0.25s;pointer-events:none;z-index:9999;max-width:280px}
.toast.show{opacity:1}

/* ---- MOBILE ---- */
@media(max-width:700px){
  body{flex-direction:column}
  .sidebar{width:100%;min-height:auto;height:auto;flex-direction:row;flex-wrap:wrap;position:sticky;top:0;z-index:100}
  .sidebar-brand{padding:12px 14px;flex:1;border-bottom:none;border-right:1px solid rgba(255,255,255,0.08)}
  .sidebar-nav{display:flex;flex-direction:row;padding:6px;flex:2;overflow-x:auto}
  .nav-item{padding:8px 12px;flex-direction:column;gap:3px;font-size:11px;border-left:none;border-bottom:3px solid transparent}
  .nav-item.active{border-left:none;border-bottom-color:var(--accent2)}
  .nav-dot{display:none}
  .sidebar-ver{display:none}
  .content{padding:16px 14px}
  .form-grid{grid-template-columns:1fr 1fr}
  .stat-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:420px){
  .form-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-brand">
    <div class="cafe-name-wrap" onclick="startEditName()" id="nameWrap">
      <span class="cafe-name-text" id="cafeNameDisplay">My Café</span>
      <span class="cafe-name-edit-btn">✎</span>
    </div>
    <div class="sidebar-subtitle">Money Tracker</div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-item active" onclick="showTab('sales')" id="nav-sales"><div class="nav-dot"></div>Daily Sales</div>
    <div class="nav-item" onclick="showTab('expenses')" id="nav-expenses"><div class="nav-dot"></div>Expenses</div>
    <div class="nav-item" onclick="showTab('inventory')" id="nav-inventory"><div class="nav-dot"></div>Inventory</div>
    <div class="nav-item" onclick="showTab('drawer')" id="nav-drawer"><div class="nav-dot"></div>Cash Drawer</div>
    <div class="nav-item" onclick="showTab('pl')" id="nav-pl"><div class="nav-dot"></div>P&amp;L Report</div>
    <div class="nav-item" onclick="showTab('settings')" id="nav-settings"><div class="nav-dot"></div>Settings</div>
  </nav>
  <div class="sidebar-ver">v1.0 · Local Storage</div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="content" id="mainContent"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ================================================================
// STORAGE
// ================================================================
// In-memory fallback if localStorage is blocked (iOS file:// protocol)
const _mem = {};
let _lsAvail = false;
try { localStorage.setItem('__t','1'); localStorage.removeItem('__t'); _lsAvail = true; } catch(e) {}

const store = {
  get: k => {
    if (_lsAvail) { try { return JSON.parse(localStorage.getItem(k)); } catch(e) {} }
    return (k in _mem) ? _mem[k] : null;
  },
  set: (k, v) => {
    if (_lsAvail) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} }
    _mem[k] = v;
  },
  remove: k => {
    if (_lsAvail) { try { localStorage.removeItem(k); } catch(e) {} }
    delete _mem[k];
  },
  arr: k => store.get(k) || []
};

// ================================================================
// STATE
// ================================================================
let activeTab = 'sales';
let state = {
  salesMonth:   todayMonth(),
  expMonth:     todayMonth(),
  invMonth:     todayMonth(),
  drawerMonth:  todayMonth(),
  plMonth:      todayMonth()
};

// ================================================================
// HELPERS
// ================================================================
function todayISO() { return new Date().toISOString().slice(0,10); }
function todayMonth() { return new Date().toISOString().slice(0,7); }
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function fmtRs(n) {
  const num = Math.round(Number(n) || 0);
  return '₹' + num.toLocaleString('en-IN');
}

function fmtMonth(ym) {
  if (!ym) return '';
  const [y, m] = ym.split('-');
  return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(m)-1] + ' ' + y;
}

function allMonths() {
  const months = new Set([todayMonth()]);
  [...store.arr('sales'), ...store.arr('expenses'), ...store.arr('inventory')]
    .forEach(e => { if (e.date) months.add(e.date.slice(0,7)); });
  return [...months].sort().reverse();
}

function monthOpts(sel) {
  return allMonths().map(m => `<option value="${m}"${m===sel?' selected':''}>${fmtMonth(m)}</option>`).join('');
}

function byMonth(arr, m) { return arr.filter(e => e.date && e.date.startsWith(m)); }

function expSum(arr, cat) { return arr.filter(e => e.category === cat).reduce((s,e) => s + (Number(e.amount)||0), 0); }

function toast(msg, dur=2800) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), dur);
}

function getCafeName() { return store.get('cafe_name') || 'My Café'; }

// ================================================================
// NAME EDIT
// ================================================================
function startEditName() {
  const w = document.getElementById('nameWrap');
  w.innerHTML = `<input class="cafe-name-input" type="text" value="${getCafeName()}"
    onblur="commitName(this)" onkeydown="if(event.key==='Enter')this.blur()" maxlength="40">`;
  w.querySelector('input').focus();
  w.querySelector('input').select();
}

function commitName(inp) {
  const name = (inp.value.trim() || 'My Café').slice(0,40);
  store.set('cafe_name', name);
  document.title = name + ' — Tracker';
  const w = document.getElementById('nameWrap');
  w.innerHTML = `<span class="cafe-name-text" id="cafeNameDisplay">${name}</span><span class="cafe-name-edit-btn">✎</span>`;
  w.onclick = startEditName;
}

// ================================================================
// NAVIGATION
// ================================================================
function showTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const navEl = document.getElementById('nav-' + tab);
  if (navEl) navEl.classList.add('active');
  render();
}

function render() {
  try {
    document.getElementById('mainContent').innerHTML = buildTab(activeTab);
  } catch(err) {
    document.getElementById('mainContent').innerHTML = `
      <div style="padding:24px;background:#fff3f2;border:1px solid #f5c6c3;border-radius:10px;margin:20px;font-size:13px;color:#7a1a14;line-height:1.8">
        <strong>Something went wrong loading this tab.</strong><br>
        Error: ${err.message}<br><br>
        If you're opening this file directly on iPhone, please host it on GitHub Pages instead
        (see the HOSTING_INSTRUCTIONS.txt file that came with this app). That fixes this permanently.
      </div>`;
  }
}

function buildTab(tab) {
  if (tab === 'sales')    return buildSales();
  if (tab === 'expenses') return buildExpenses();
  if (tab === 'inventory')return buildInventory();
  if (tab === 'drawer')   return buildDrawer();
  if (tab === 'pl')       return buildPL();
  if (tab === 'settings') return buildSettings();
  return '';
}

// ================================================================
// TAB: DAILY SALES
// ================================================================
function buildSales() {
  const all = store.arr('sales');
  const filtered = byMonth(all, state.salesMonth);
  const totalSales = filtered.reduce((s,e) => s + (Number(e.cash)||0) + (Number(e.upi)||0), 0);
  const totalCash  = filtered.reduce((s,e) => s + (Number(e.cash)||0), 0);
  const totalUPI   = filtered.reduce((s,e) => s + (Number(e.upi)||0), 0);
  const avgDaily   = filtered.length ? Math.round(totalSales / filtered.length) : 0;
  const sorted = [...filtered].sort((a,b) => b.date.localeCompare(a.date));

  return `
<div class="page-title">Daily Sales Log</div>

<div class="form-card">
  <div class="section-label">Add New Entry</div>
  <div class="form-grid">
    <div class="form-group">
      <label>Date</label>
      <input type="date" id="s_date" value="${todayISO()}">
    </div>
    <div class="form-group">
      <label>Cash Sales (₹)</label>
      <input type="number" id="s_cash" placeholder="0" min="0" oninput="calcSalesLive()">
    </div>
    <div class="form-group">
      <label>UPI / Online Sales (₹)</label>
      <input type="number" id="s_upi" placeholder="0" min="0" oninput="calcSalesLive()">
    </div>
    <div class="form-group">
      <label>Customer Count</label>
      <input type="number" id="s_cust" placeholder="0" min="0" oninput="calcSalesLive()">
    </div>
    <div class="form-group full">
      <label>Notes (optional)</label>
      <input type="text" id="s_notes" placeholder="Holiday, event, slow day, staff absent...">
    </div>
  </div>
  <div class="live-calc" id="s_calc"></div>
  <div class="form-actions">
    <button class="btn btn-primary" onclick="addSale()">Add Entry</button>
    <span class="sync-msg" id="s_sync"></span>
  </div>
</div>

<div class="stat-grid">
  <div class="stat-card">
    <div class="stat-label">Total Sales</div>
    <div class="stat-value">${fmtRs(totalSales)}</div>
    <div class="stat-sub">${filtered.length} days recorded</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Cash</div>
    <div class="stat-value">${fmtRs(totalCash)}</div>
    <div class="stat-sub">${totalSales > 0 ? Math.round(totalCash/totalSales*100) : 0}% of total</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">UPI / Online</div>
    <div class="stat-value">${fmtRs(totalUPI)}</div>
    <div class="stat-sub">${totalSales > 0 ? Math.round(totalUPI/totalSales*100) : 0}% of total</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Avg Daily Sales</div>
    <div class="stat-value">${fmtRs(avgDaily)}</div>
  </div>
</div>

<div class="table-card">
  <div class="table-header">
    <div class="table-title">Entries — ${fmtMonth(state.salesMonth)}</div>
    <div class="table-controls">
      <div class="month-sel">
        Month: <select onchange="state.salesMonth=this.value;render()">${monthOpts(state.salesMonth)}</select>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="exportCSV('sales')">Export CSV</button>
    </div>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr>
        <th>Date</th><th>Cash</th><th>UPI/Online</th><th>Total</th><th>Customers</th><th>Avg Order</th><th>Notes</th><th></th>
      </tr></thead>
      <tbody>
      ${sorted.length === 0
        ? `<tr><td colspan="8" class="empty">No entries for ${fmtMonth(state.salesMonth)} — add one above</td></tr>`
        : sorted.map(e => {
            const tot = (Number(e.cash)||0) + (Number(e.upi)||0);
            const aov = e.customers > 0 ? Math.round(tot / e.customers) : null;
            return `<tr>
              <td>${e.date}</td>
              <td>${fmtRs(e.cash)}</td>
              <td>${fmtRs(e.upi)}</td>
              <td class="bold">${fmtRs(tot)}</td>
              <td>${e.customers || '—'}</td>
              <td>${aov ? fmtRs(aov) : '—'}</td>
              <td class="muted" style="max-width:160px;overflow:hidden;text-overflow:ellipsis">${e.notes || ''}</td>
              <td><button class="btn-del" onclick="del('sales','${e.id}')">✕</button></td>
            </tr>`;
          }).join('')
      }
      </tbody>
    </table>
  </div>
</div>`;
}

function calcSalesLive() {
  const cash = Number(document.getElementById('s_cash')?.value || 0);
  const upi  = Number(document.getElementById('s_upi')?.value || 0);
  const cust = Number(document.getElementById('s_cust')?.value || 0);
  const tot  = cash + upi;
  const el   = document.getElementById('s_calc');
  if (!el) return;
  if (tot <= 0) { el.innerHTML = ''; return; }
  const aov = cust > 0 ? ` &nbsp;·&nbsp; Avg Order: <strong>${fmtRs(Math.round(tot/cust))}</strong>` : '';
  el.innerHTML = `Total: <strong>${fmtRs(tot)}</strong>${aov}`;
}

function addSale() {
  const date      = document.getElementById('s_date').value;
  const cash      = parseFloat(document.getElementById('s_cash').value) || 0;
  const upi       = parseFloat(document.getElementById('s_upi').value) || 0;
  const customers = parseInt(document.getElementById('s_cust').value) || 0;
  const notes     = document.getElementById('s_notes').value.trim();
  if (!date) { toast('Please enter a date'); return; }
  if (cash + upi === 0) { toast('Please enter at least one sales amount'); return; }
  const entry = { id: genId(), date, cash, upi, customers, notes };
  const arr = store.arr('sales');

function calcDrawerLive() {
  const float  = Number(document.getElementById('d_float')?.value  || 0);
  const sales  = Number(document.getElementById('d_sales')?.value  || 0);
  const actual = Number(document.getElementById('d_actual')?.value || 0);
  const kept   = Number(document.getElementById('d_kept')?.value   || 0);
  const next   = Number(document.getElementById('d_next')?.value   || 0);
  const el     = document.getElementById('d_calc');
  if (!el) return;

  const expected = float + sales;
  if (expected === 0 && actual === 0) { el.innerHTML = ''; return; }

  const diff       = expected - actual;
  const checkTotal = kept + next;
  const remaining  = actual - checkTotal;

  let html = '';
  if (expected > 0) {
    html += `<span>Expected in drawer: <strong>${fmtRs(expected)}</strong>`;
    if (actual > 0) {
      const diffLabel = diff > 0
        ? `<span style="color:var(--red)"> — ₹${Math.abs(diff).toLocaleString('en-IN')} spent/missing from drawer</span>`
        : diff < 0
        ? `<span style="color:var(--green)"> — ₹${Math.abs(diff).toLocaleString('en-IN')} extra (possible entry error)</span>`
        : `<span style="color:var(--green)"> — exact match</span>`;
      html += diffLabel;
    }
    html += '</span>';
  }
  if (actual > 0 && (kept > 0 || next > 0)) {
    const remStyle = Math.abs(remaining) > 10 ? 'color:var(--red)' : 'color:var(--green)';
    html += `<span>Kept aside + Next float = ${fmtRs(checkTotal)} &nbsp;·&nbsp; <span style="${remStyle}">Unaccounted: ${fmtRs(remaining)}${Math.abs(remaining) > 10 ? ' (check your numbers)' : ' ✓'}</span></span>`;
  }
  el.innerHTML = html;
}

        <div class="pl-row" style="border-top:1px solid var(--border);color:var(--text2);font-size:13px">
          <span>Raw Material % of Revenue</span>
          <span style="color:${parseFloat(rmPct) > 38 ? 'var(--red)' : 'var(--green)'}">${rmPct}%</span>
        </div>
        <div class="pl-row" style="color:var(--text2);font-size:13px">
          <span>Salary % of Revenue</span>
          <span>${salPct}%</span>
        </div>
        <div class="pl-row" style="color:var(--text2);font-size:13px">
          <span>Net Profit Margin</span>
          <span style="color:${parseFloat(profitPct) > 0 ? 'var(--green)' : 'var(--red)'}">${profitPct}%</span>
        </div>
      </div>`;

  return `
<div class="page-title">
  Monthly P&amp;L
  <div class="month-sel">
    Month: <select onchange="state.plMonth=this.value;render()">${monthOpts(state.plMonth)}</select>
  </div>
</div>

<div class="stat-grid">
  <div class="stat-card">
    <div class="stat-label">Revenue</div>
    <div class="stat-value">${fmtRs(totalRev)}</div>
    <div class="stat-sub">${sales.length} days</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Expenses</div>
    <div class="stat-value neg">${fmtRs(opEx)}</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Net Profit</div>
    <div class="stat-value ${netProfit >= 0 ? 'pos' : 'neg'}">${fmtRs(netProfit)}</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Profit Margin</div>
    <div class="stat-value ${parseFloat(profitPct) > 0 ? 'pos' : 'neg'}">${profitPct}%</div>
  </div>
</div>

${plContent}`;
}

<div class="settings-block">

function saveCafeName() {
  const n = document.getElementById('set_name').value.trim() || 'My Café';
  store.set('cafe_name', n);
  document.getElementById('cafeNameDisplay').textContent = n;
  document.title = n + ' — Tracker';
  toast('Name saved');
}

async function saveUrl() {
  const url = document.getElementById('set_url').value.trim();
  store.set('sheets_url', url);
  toast('URL saved');
}

async function testUrl() {
  const url = store.get('sheets_url');
  const el  = document.getElementById('test_result');
  if (!url) { el.textContent = 'No URL saved yet'; return; }
  el.textContent = 'Testing...';
  el.className = 'sync-msg';
  try {
    await fetch(url + '?ping=1', { mode: 'no-cors' });
    el.textContent = '✓ Reachable';
    el.className = 'sync-msg ok';
  } catch(e) {
    el.textContent = '✗ Could not reach URL';
    el.className = 'sync-msg err';
  }
}

// ================================================================
// SHARED
// ================================================================
function del(type, id) {
  if (!confirm('Delete this entry?')) return;
  store.set(type, store.arr(type).filter(e => e.id !== id));
  render();
  toast('Entry deleted');
}

function exportCSV(type) {
  const data = store.arr(type);
  if (!data.length) { toast('No data to export'); return; }
  let headers, rows;
  if (type === 'sales') {
    headers = ['Date','Cash (Rs)','UPI/Online (Rs)','Total (Rs)','Customers','Avg Order Value (Rs)','Notes'];
    rows = data.map(e => {
      const tot = (Number(e.cash)||0)+(Number(e.upi)||0);
      const aov = e.customers > 0 ? Math.round(tot/e.customers) : '';
      return [e.date, e.cash||0, e.upi||0, tot, e.customers||0, aov, e.notes||''];
    });
  } else if (type === 'expenses') {
    headers = ['Date','Category','Description','Amount (Rs)','Paid Via','Notes'];
    rows = data.map(e => [e.date, e.category, e.description, e.amount, e.paidVia, e.notes||'']);
  } else if (type === 'drawer') {
    headers = ['Date','Morning Float (Rs)','Cash Sales (Rs)','Expected (Rs)','Actual Counted (Rs)','Difference (Rs)','Kept Aside (Rs)','Next Float (Rs)','Notes'];
    rows = data.map(e => {
      const exp  = (Number(e.morningFloat)||0) + (Number(e.cashSales)||0);
      const diff = exp - (Number(e.actualCounted)||0);
      return [e.date, e.morningFloat||0, e.cashSales||0, exp, e.actualCounted||0, diff, e.keptAside||0, e.nextFloat||0, e.notes||''];
    });
  } else {
    headers = ['Date','Item','Quantity','Unit','Amount (Rs)','Supplier','Bought By'];
    rows = data.map(e => [e.date, e.item, e.qty, e.unit, e.amount, e.supplier||'', e.boughtBy||'']);
  }
  const esc = v => '"' + String(v||'').replace(/"/g,'""') + '"';
  const csv = [headers, ...rows].map(r => r.map(esc).join(',')).join('\r\n');
  const a   = document.createElement('a');
  a.href    = 'data:text/csv;charset=utf-8,\uFEFF' + encodeURIComponent(csv);
  a.download= `${type}_${new Date().toISOString().slice(0,7)}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  toast('CSV downloaded');
}

async function syncEntry(type, entry, syncElId) {
  const url = store.get('sheets_url');
  if (!url) return;
  const el = document.getElementById(syncElId);
  if (el) { el.textContent = 'Syncing...'; el.className = 'sync-msg'; }
  try {
    await fetch(url, {
      method: 'POST',
      mode:   'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body:   JSON.stringify({ type, entry })
    });
    if (el) { el.textContent = '✓ Saved to Sheets'; el.className = 'sync-msg ok'; }
    setTimeout(() => { if (el) el.textContent = ''; }, 4000);
  } catch(err) {
    if (el) { el.textContent = '✗ Sync failed (local save still worked)'; el.className = 'sync-msg err'; }
  }
}

function clearAll() {
  ['sales','expenses','inventory','drawer','cafe_name','sheets_url'].forEach(k => store.remove(k));
  render();
  toast('All data cleared');
}

(function init() {
  const name = getCafeName();
  document.title = name + ' — Tracker';
  const nd = document.getElementById('cafeNameDisplay');
  if (nd) nd.textContent = name;
  const nw = document.getElementById('nameWrap');
  if (nw) nw.onclick = startEditName;

  // Warn if running as local file (data won't persist on iPhone)
  if (location.protocol === 'file:' && !_lsAvail) {
    const warn = document.createElement('div');
    warn.style = 'background:#fff8e1;border-bottom:1px solid #ffe082;padding:9px 18px;font-size:12.5px;color:#7a5c00;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap';
    warn.innerHTML = `<span>⚠ Running as local file — data won't save between sessions on this device. Host on GitHub Pages for permanent storage.</span><button onclick="this.parentNode.remove()" style="background:none;border:none;font-size:15px;cursor:pointer;color:#7a5c00;padding:0 4px">✕</button>`;
    document.body.insertBefore(warn, document.querySelector('.main'));
  }

  render();
})();
